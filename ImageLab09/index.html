<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
     <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box> -->
      <a-sphere position="0 1.25 -5" radius="1.5" color="white"></a-sphere>
      <a-sphere position="0 2.5 -5" radius="1.25" color="white"></a-sphere>
      <a-sphere position="0 3.5 -5" radius="1" color="white"></a-sphere>
      <a-cone position ='0 3.8 -4' rotation= "90 0 0" radius ='0.5' color = 'orange' scale="0.5 3 0.5"> </a-cone>
      <a-sphere position="0 3 -3.9" radius="0.2" color="black"></a-sphere>
      <a-sphere position="0 2.2 -3.8" radius="0.2" color="black"></a-sphere>
      <a-sphere position="0 1.5 -3.6" radius="0.2" color="black"></a-sphere>
      <!-- <a-sky color="#ECECEC"></a-sky> -->
      <!-- the enviroment entity includes a sky. Choose from the presets"none, default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris, moon" -->
      <a-entity environment="preset: moon; dressingAmount: 500"></a-entity>
    </a-scene>
  </body>
</html>
